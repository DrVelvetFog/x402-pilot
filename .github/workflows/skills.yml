name: skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate SKILL.md frontmatter against the Agent Skills spec
        run: python3 scripts/validate_skills.py
